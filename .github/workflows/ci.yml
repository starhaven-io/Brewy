name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
  push:
    branches:
      - main

defaults:
  run:
    shell: bash -xeuo pipefail {0}

concurrency:
  # PR body/title edits fire `edited` events; give them their own per-run group so
  # they can't cancel in-flight tests from the preceding `opened`/`synchronize` run.
  group: ${{ github.event.action == 'edited' && format('ci-edit-{0}-{1}', github.ref, github.run_id) || format('ci-{0}', github.ref) }}
  cancel-in-progress: true

permissions: {}

jobs:
  generate-matrix:
    name: Generate matrix
    runs-on: ubuntu-slim
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Generate CI matrix
        id: matrix
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          EVENT_ACTION: ${{ github.event.action }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          # Push to main: run test-tsan so Codecov has a baseline for PR
          # coverage comparisons.
          if [[ "${EVENT_NAME}" == "push" ]]; then
            echo 'matrix=[{"name":"Test (Thread Sanitizer)","check":"test-tsan","runner":"macos-26","xcodebuild_flags":"-enableCodeCoverage YES -enableThreadSanitizer YES","result_bundle":"TestResults-TSAN","environment":"codecov"}]' >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          MATRIX='[{"name":"Conventional Commits","check":"commits","runner":"ubuntu-slim","fetch_depth":"0"}'

          # For title/body edits, only recheck conventional commits
          if [[ "${EVENT_ACTION}" == "edited" ]]; then
            echo "matrix=${MATRIX}]" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          CHANGED=$(git diff --name-only "${BASE_SHA}...HEAD")

          # Swift or CI workflow changes: lint + sanitizer tests
          if echo "${CHANGED}" | grep -qE '\.swift$|^Brewy\.xcodeproj/|^\.swiftlint\.yml$|^\.github/workflows/ci\.yml$'; then
            MATRIX+=',{"name":"Lint","check":"lint","runner":"macos-26"}'
            MATRIX+=',{"name":"Test (Thread Sanitizer)","check":"test-tsan","runner":"macos-26","xcodebuild_flags":"-enableCodeCoverage YES -enableThreadSanitizer YES","result_bundle":"TestResults-TSAN","environment":"codecov"}'
            MATRIX+=',{"name":"Test (Address Sanitizer)","check":"test-asan","runner":"macos-26","xcodebuild_flags":"-enableAddressSanitizer YES","result_bundle":"TestResults-ASAN"}'
          fi

          # Source changes: CodeQL (excludes xcodeproj-only changes like version bumps)
          if echo "${CHANGED}" | grep -qE '^Brewy/|^BrewyTests/|^BrewyUITests/'; then
            MATRIX+=',{"name":"CodeQL","check":"codeql","runner":"macos-26"}'
          fi

          # Workflow changes: Actions security audit
          if echo "${CHANGED}" | grep -qE '^\.github/workflows/'; then
            MATRIX+=',{"name":"zizmor","check":"zizmor","runner":"ubuntu-latest"}'
          fi

          echo "matrix=${MATRIX}]" >> "${GITHUB_OUTPUT}"

  check:
    name: ${{ matrix.name }}
    needs: generate-matrix
    runs-on: ${{ matrix.runner }}
    environment:
      name: ${{ matrix.environment }}
      deployment: false
    # Cap at 45m: lint/commits finish in seconds, CodeQL runs ~20m, sanitizer
    # test jobs ~10m. Anything past this is a hang — fail fast instead of
    # burning up to 6h of the default runner budget.
    timeout-minutes: 45
    permissions:
      contents: read
      pull-requests: read # required to fetch PR commits for conventional commit validation
      security-events: write # required for CodeQL and zizmor SARIF uploads
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: ${{ matrix.fetch_depth || 1 }}
          persist-credentials: false

      # --- Conventional Commits ---

      - name: Check PR title
        if: matrix.check == 'commits'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          PATTERN='^(feat|fix|docs|style|refactor|perf|test|build|ci|chore)(\(.+\))?: .+'
          if [[ ! "${PR_TITLE}" =~ ${PATTERN} ]]; then
            echo "::error::PR title '${PR_TITLE}' does not follow Conventional Commits."
            echo ""
            echo "Expected format: <type>(<scope>): <description>"
            echo ""
            echo "Types: feat, fix, docs, style, refactor, perf, test, build, ci, chore"
            echo ""
            echo "Examples:"
            echo "  feat: add Sparkle auto-update support"
            echo "  fix(updater): resolve crash on empty appcast"
            echo "  ci: automate appcast generation on release"
            exit 1
          fi

      - name: Check commit messages
        if: matrix.check == 'commits'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          PATTERN='^(feat|fix|docs|style|refactor|perf|test|build|ci|chore)(\(.+\))?: .+'
          FAILED=0
          while IFS= read -r LINE; do
            SHA="${LINE%% *}"
            MSG="${LINE#* }"
            if [[ "${MSG}" == Merge\ * ]]; then
              continue
            fi
            if [[ ! "${MSG}" =~ ${PATTERN} ]]; then
              echo "::error::Commit ${SHA} does not follow Conventional Commits: '${MSG}'"
              FAILED=1
            fi
          done < <(git log --format="%h %s" "${BASE_SHA}..${HEAD_SHA}")

          if [[ "${FAILED}" -eq 1 ]]; then
            echo ""
            echo "All commit messages must follow: <type>(<scope>): <description>"
            echo "Types: feat, fix, docs, style, refactor, perf, test, build, ci, chore"
            exit 1
          fi

      # --- Lint ---

      - name: Install lint tools
        if: matrix.check == 'lint'
        env:
          HOMEBREW_NO_AUTO_UPDATE: 1
          HOMEBREW_NO_ENV_HINTS: 1
        run: brew install swiftlint typos-cli

      - name: SwiftLint
        if: matrix.check == 'lint'
        run: swiftlint --strict

      - name: Typos
        if: matrix.check == 'lint'
        run: typos

      # --- Tests ---

      - name: Test
        if: startsWith(matrix.check, 'test-')
        env:
          XCODEBUILD_FLAGS: ${{ matrix.xcodebuild_flags }}
          RESULT_BUNDLE: ${{ matrix.result_bundle }}
        run: |
          xcodebuild test \
            -project Brewy.xcodeproj \
            -scheme Brewy \
            -destination 'platform=macOS' \
            -derivedDataPath ./DerivedData \
            ${XCODEBUILD_FLAGS} \
            -resultBundlePath "${RESULT_BUNDLE}.xcresult" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            EXCLUDED_ARCHS=x86_64

      - name: Coverage Summary
        if: success() && matrix.check == 'test-tsan'
        run: xcrun xccov view --report --only-targets TestResults-TSAN.xcresult

      - name: Export LCOV for Codecov
        if: success() && matrix.check == 'test-tsan'
        run: |
          PROFDATA=$(find ./DerivedData -name 'Coverage.profdata' -type f | head -1)
          if [[ -z "${PROFDATA}" ]]; then
            echo "::error::No Coverage.profdata found under ./DerivedData"
            exit 1
          fi
          BINARY_ARGS=()
          FIRST=""
          # Skip bundles nested inside .framework or .xctest — embedded helpers
          # (e.g. Sparkle's Updater.app) ship as universal binaries that
          # llvm-cov can't export without an explicit -arch.
          while IFS= read -r xctest; do
            name=$(basename "${xctest}" .xctest)
            bin="${xctest}/Contents/MacOS/${name}"
            [[ -f "${bin}" ]] || continue
            if [[ -z "${FIRST}" ]]; then FIRST="${bin}"; else BINARY_ARGS+=(-object "${bin}"); fi
          done < <(find ./DerivedData/Build/Products -name '*.xctest' -type d -not -path '*.framework/*' -not -path '*.xctest/*')
          while IFS= read -r app; do
            name=$(basename "${app}" .app)
            # Xcode Debug builds split the app into a launcher stub and a
            # .debug.dylib that carries the instrumentation; prefer the dylib.
            dylib="${app}/Contents/MacOS/${name}.debug.dylib"
            bin="${app}/Contents/MacOS/${name}"
            if [[ -f "${dylib}" ]]; then
              candidate="${dylib}"
            elif [[ -f "${bin}" ]]; then
              candidate="${bin}"
            else
              continue
            fi
            if [[ -z "${FIRST}" ]]; then FIRST="${candidate}"; else BINARY_ARGS+=(-object "${candidate}"); fi
          done < <(find ./DerivedData/Build/Products -name '*.app' -type d -not -path '*.framework/*' -not -path '*.xctest/*' -not -name '*-Runner.app')
          if [[ -z "${FIRST}" ]]; then
            echo "::error::No instrumented binaries found under ./DerivedData/Build/Products"
            exit 1
          fi
          xcrun llvm-cov export -format=lcov \
            -ignore-filename-regex='(Tests/|\.build/|DerivedData/|/Checkouts/|/SourcePackages/)' \
            "${FIRST}" \
            ${BINARY_ARGS[@]+"${BINARY_ARGS[@]}"} \
            -instr-profile="${PROFDATA}" \
            > coverage.lcov
          echo "lcov: $(wc -l < coverage.lcov) lines"

      - name: Upload coverage to Codecov
        if: success() && matrix.check == 'test-tsan'
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5.5.4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.lcov
          fail_ci_if_error: false

      - name: Convert xcresult to JUnit
        if: ${{ !cancelled() && matrix.check == 'test-tsan' }}
        env:
          RESULT_BUNDLE: ${{ matrix.result_bundle }}
        run: python3 scripts/xcresult-to-junit.py "${RESULT_BUNDLE}.xcresult" > junit.xml

      - name: Upload test results to Codecov
        if: ${{ !cancelled() && matrix.check == 'test-tsan' }}
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5.5.4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: junit.xml
          fail_ci_if_error: false
          report_type: test_results

      - name: Upload Test Results
        if: always() && startsWith(matrix.check, 'test-')
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.result_bundle }}
          path: ${{ matrix.result_bundle }}.xcresult
          retention-days: 14

      # --- CodeQL ---

      - name: Initialize CodeQL
        if: matrix.check == 'codeql'
        uses: github/codeql-action/init@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          languages: swift
          build-mode: manual

      - name: Build for CodeQL
        if: matrix.check == 'codeql'
        run: |
          xcodebuild \
            -project Brewy.xcodeproj \
            -scheme Brewy \
            -destination 'generic/platform=macOS' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            EXCLUDED_ARCHS=x86_64 \
            build

      - name: CodeQL Analysis
        if: matrix.check == 'codeql'
        uses: github/codeql-action/analyze@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          category: "/language:swift"

      # --- zizmor ---

      - name: Run zizmor
        if: matrix.check == 'zizmor'
        uses: zizmorcore/zizmor-action@b1d7e1fb5de872772f31590499237e7cce841e8e # v0.5.3
        with:
          persona: auditor

  conclusion:
    name: conclusion
    needs: check
    runs-on: ubuntu-slim
    if: always()
    steps:
      - name: Result
        env:
          CHECK_RESULT: ${{ needs.check.result }}
        run: test "${CHECK_RESULT}" = "success"
